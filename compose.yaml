services:
  database:
    container_name: myd17
    platform: linux/amd64
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale-provider=icu --icu-locale=pl-PL"
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - myd17-network

  strapi:
    container_name: strapi
    build: ./apps/strapi
    image: strapi:latest
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: database
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      APP_KEYS: ${APP_KEYS}
      NODE_ENV: ${NODE_ENV}
    volumes:
      - ./apps/strapi/config:/opt/app/config
      - ./apps/strapi/src:/opt/app/src
      - ./apps/strapi/public/uploads:/opt/app/public/uploads
    ports:
      - "1337:1337"
    networks:
      - myd17-network
    depends_on:
      database:
        condition: service_healthy

volumes:
  pgdata:
    driver: local

networks:
  myd17-network:
    name: myd17-network
    driver: bridge
