services:
  database:
    container_name: myd17
    platform: linux/amd64
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale-provider=icu --icu-locale=pl-PL"
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - myd17-network

  strapi:
    container_name: strapi
    profiles: ["prod"]
    image: ${STRAPI_IMAGE:-ghcr.io/stawex-team/myd17/strapi:latest}
    restart: unless-stopped
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-1337}
      DATABASE_CLIENT: postgres
      DATABASE_HOST: database
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      APP_KEYS: ${APP_KEYS}
      STRAPI_ADMIN_PASSWORD: ${STRAPI_ADMIN_PASSWORD}
      STRAPI_EMPLOYEE_PASSWORD: ${STRAPI_EMPLOYEE_PASSWORD}
      NODE_ENV: production
    volumes:
      - strapi_uploads:/opt/app/apps/strapi/public/uploads
    ports:
      - "1337:1337"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1337/_health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - myd17-network
    depends_on:
      database:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
  strapi_uploads:
    driver: local

networks:
  myd17-network:
    name: myd17-network
    driver: bridge
