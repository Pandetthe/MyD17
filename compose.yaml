services:
  database:
    container_name: myd17
    platform: linux/amd64
    profiles: ["managed-db"]
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale-provider=icu --icu-locale=pl-PL"
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - myd17-network

  myd17-cms:
    container_name: myd17-cms
    profiles: ["prod"]
    image: ghcr.io/pandetthe/myd17-cms:${MYD17_VERSION:-latest}
    restart: unless-stopped
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-1337}
      DATABASE_CLIENT: postgres
      DATABASE_HOST: ${DATABASE_HOST:-database}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      APP_KEYS: ${APP_KEYS}
      STRAPI_ADMIN_PASSWORD: ${STRAPI_ADMIN_PASSWORD}
      STRAPI_EMPLOYEE_PASSWORD: ${STRAPI_EMPLOYEE_PASSWORD}
      STRAPI_URL: ${STRAPI_URL:-http://localhost:1337}
      FIREBASE_SERVICE_ACCOUNT: ${FIREBASE_SERVICE_ACCOUNT:-}
      PREVIEW_SECRET: ${PREVIEW_SECRET:-}
      EXPO_WEB_URL: ${EXPO_WEB_URL:-}
      NODE_ENV: production
    volumes:
      - strapi_uploads:/opt/app/apps/strapi/public/uploads
    ports:
      - "1337:1337"
    networks:
      - myd17-network
    depends_on:
      database:
        condition: service_healthy
        required: false

  myd17-preview:
    container_name: myd17-preview
    profiles: ["preview"]
    image: ghcr.io/pandetthe/myd17-preview:${MYD17_VERSION:-latest}
    restart: unless-stopped
    environment:
      EXPO_PUBLIC_STRAPI_URL: ${EXPO_PUBLIC_STRAPI_URL:-}
    networks:
      - myd17-network

  nginx:
    container_name: myd17-nginx
    image: nginx:alpine
    profiles: ["nginx"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      myd17-cms:
        condition: service_started
      myd17-preview:
        condition: service_started
        required: false
    networks:
      - myd17-network

volumes:
  pgdata:
    driver: local
  strapi_uploads:
    driver: local

networks:
  myd17-network:
    name: myd17-network
    driver: bridge
