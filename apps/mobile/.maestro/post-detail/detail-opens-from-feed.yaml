appId: io.github.pandetthe.myd17
# Tap the first post card to open the detail screen.
---
- launchApp
- extendedWaitUntil:
    visible:
      id: "posts-feed-list"
    timeout: 30000
# Tap center of first post card (coordinate-based — card covers the entire cell)
- tapOn:
    point: "50%, 40%"
- extendedWaitUntil:
    visible:
      id: "post-detail-screen"
    timeout: 15000
- assertVisible:
    id: "post-detail-scroll"
- assertVisible:
    id: "post-detail-title"
- assertVisible:
    id: "post-detail-back-btn"
